<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Break Tracker — Select Location</title>
<style>
  :root { --bg:#0f1117; --surface:#1a1d27; --card:#22263a; --accent:#4f8ef7; --text:#e2e8f0; --muted:#64748b; --border:#2d3348; }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif; min-height:100vh; display:flex; align-items:center; justify-content:center; }
  .container { text-align:center; padding:32px 16px; }
  h1 { font-size:1.5rem; font-weight:800; color:var(--accent); margin-bottom:8px; }
  p { color:var(--muted); font-size:0.9rem; margin-bottom:40px; }
  .grid { display:grid; grid-template-columns:repeat(2,1fr); gap:16px; max-width:400px; margin:0 auto; }
  a { display:block; background:var(--card); border:1px solid var(--border); border-radius:14px; padding:28px 16px; text-decoration:none; color:var(--text); font-size:1.2rem; font-weight:800; transition:all .2s; }
  a:hover { border-color:var(--accent); color:var(--accent); transform:translateY(-2px); }
  .sub { display:block; font-size:0.72rem; color:var(--muted); font-weight:400; margin-top:4px; }
</style>
</head>
<body>
